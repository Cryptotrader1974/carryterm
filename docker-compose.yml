version: "3.9"

services:
  app:
    build: .
    container_name: carryterm
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - ./data.db:/app/data.db   # persist SQLite database
    environment:
      - NODE_ENV=production
      - PORT=5000

  nginx:
    image: nginx:alpine
    container_name: carryterm-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - app
